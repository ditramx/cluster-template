apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: infra
  source:
    repoURL: <REPO_URL>
    targetRevision: HEAD
    path: apps
    directory:
      recurse: true
      exclude: "root-app.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
