apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openebs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    github-repo-url: "<GITHUB_REPO_URL>"
    notifications.argoproj.io/subscribe.on-sync-failed.webex: ""
    notifications.argoproj.io/subscribe.on-health-degraded.webex: ""
    notifications.argoproj.io/subscribe.on-deployed.webex: ""
    notifications.argoproj.io/subscribe.on-sync-failed.smtp: "<NOTIFICATION_EMAIL>"
    notifications.argoproj.io/subscribe.on-health-degraded.smtp: "<NOTIFICATION_EMAIL>"
    notifications.argoproj.io/subscribe.on-deployed.smtp: "<NOTIFICATION_EMAIL>"
spec:
  project: infra
  sources:
    - repoURL: https://openebs.github.io/openebs
      chart: openebs
      targetRevision: "4.2.0"
      helm:
        valueFiles:
          - $values/infra/openebs/values.yaml
    - repoURL: <REPO_URL>
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: openebs
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
