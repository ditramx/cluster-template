apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    github-repo-url: "<GITHUB_REPO_URL>"
    notifications.argoproj.io/subscribe.on-sync-failed.webex: ""
    notifications.argoproj.io/subscribe.on-health-degraded.webex: ""
    notifications.argoproj.io/subscribe.on-deployed.webex: ""
    notifications.argoproj.io/subscribe.on-sync-failed.smtp: "<NOTIFICATION_EMAIL>"
    notifications.argoproj.io/subscribe.on-health-degraded.smtp: "<NOTIFICATION_EMAIL>"
    notifications.argoproj.io/subscribe.on-deployed.smtp: "<NOTIFICATION_EMAIL>"
spec:
  project: infra
  sources:
    - repoURL: https://bitnami-labs.github.io/sealed-secrets
      chart: sealed-secrets
      targetRevision: "2.16.2"
      helm:
        valueFiles:
          - $values/infra/sealed-secrets/values.yaml
    - repoURL: <REPO_URL>
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
