apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
spec:
  description: Infraestructura base del cluster
  sourceRepos:
    - '<REPO_URL>'
    - 'https://metallb.github.io/metallb'
    - 'https://openebs.github.io/openebs'
    - 'https://helm.traefik.io/traefik'
    - 'https://bitnami-labs.github.io/sealed-secrets'
  destinations:
    - namespace: metallb-system
      server: https://kubernetes.default.svc
    - namespace: traefik
      server: https://kubernetes.default.svc
    - namespace: openebs
      server: https://kubernetes.default.svc
    - namespace: sealed-secrets
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: systems
  namespace: argocd
spec:
  description: Sistemas de negocio
  sourceRepos:
    - '<REPO_URL>'
    # Agregar repos adicionales según los sistemas del cliente
  destinations:
    # Agregar namespaces según los sistemas del cliente
    - namespace: placeholder
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
